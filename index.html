<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="in-browser image glitch editor <3">
  <meta name="theme-color" content="#1e1e1e">
  <meta property="og:title" content="glitchbuf">
  <meta property="og:description" content="in-browser image glitch editor <3">
  <meta property="og:type" content="website">
  <title>glitchbuf</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%231e1e1e'/><rect x='2' y='2' width='2' height='2' fill='red'/><rect x='4' y='2' width='2' height='2' fill='yellow'/><rect x='6' y='2' width='4' height='2' fill='white'/><rect x='10' y='2' width='2' height='2' fill='cyan'/><rect x='12' y='2' width='2' height='2' fill='blue'/><rect x='5' y='4' width='2' height='3' fill='red'/><rect x='7' y='4' width='2' height='3' fill='yellow'/><rect x='9' y='4' width='4' height='3' fill='white'/><rect x='13' y='4' width='2' height='3' fill='cyan'/><rect x='15' y='4' width='2' height='3' fill='blue'/><rect x='1' y='7' width='2' height='2' fill='yellow'/><rect x='3' y='7' width='4' height='2' fill='white'/><rect x='7' y='7' width='2' height='2' fill='cyan'/><rect x='9' y='7' width='2' height='2' fill='blue'/><rect x='3' y='9' width='2' height='2' fill='red'/><rect x='5' y='9' width='2' height='2' fill='yellow'/><rect x='7' y='9' width='4' height='2' fill='white'/><rect x='11' y='9' width='2' height='2' fill='cyan'/><rect x='13' y='9' width='2' height='2' fill='blue'/><rect x='2' y='11' width='2' height='3' fill='red'/><rect x='4' y='11' width='2' height='3' fill='yellow'/><rect x='6' y='11' width='4' height='3' fill='white'/><rect x='10' y='11' width='2' height='3' fill='cyan'/><rect x='12' y='11' width='2' height='3' fill='blue'/></svg>">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="editor.css">
</head>

<body>
  <div id="controls">
    <div class="file-seed-row">
      <div class="field">
        <label for="file">input image</label>
        <input type="file" id="file" accept="image/*">
      </div>
      <div class="field seed-row">
        <label for="seed">seed</label>
        <input type="text" id="seed" spellcheck="false">
        <button id="new-seed" type="button">randomise</button>
      </div>
    </div>
    <div class="field presets-row">
      <label for="presets">presets</label>
      <select id="presets">
        <option value="">— select preset —</option>
      </select>
      <button id="save-preset" type="button">save</button>
      <button id="delete-preset" type="button" disabled>delete</button>
    </div>
    <!-- #canvas-pane sits inside #controls so the 2-col CSS grid can span it across column 2.
         On mobile (≤768px), controls is flex-column and it flows naturally in DOM order. -->
    <div id="canvas-pane">
      <div id="no-image">no image loaded</div>
      <div id="loading" role="status" aria-live="polite">rendering…</div>
      <div id="canvas-wrap">
        <span id="preview-label">preview</span>
        <canvas id="canvas"></canvas>
      </div>
    </div>
    <div class="field script-field">
      <label>script</label>
      <div class="textarea-wrap">
        <div id="editor"></div>
      </div>
    </div>
    <div class="buttons">
      <button id="help-btn" type="button">help</button>
      <button id="download" type="button">download png</button>
    </div>
    <pre id="error" role="alert"></pre>
  </div>
  <dialog id="modal" aria-labelledby="modal-msg" aria-modal="true">
    <p id="modal-msg"></p>
    <input id="modal-input" type="text" spellcheck="false" hidden>
    <div class="modal-buttons">
      <button id="modal-ok" type="button">ok</button>
      <button id="modal-cancel" type="button">cancel</button>
    </div>
  </dialog>
  <dialog id="preset-confirm-dialog" aria-labelledby="preset-confirm-msg" aria-modal="true">
    <p id="preset-confirm-msg">save current script as a preset before loading?</p>
    <div class="field">
      <label for="preset-confirm-name">name</label>
      <input id="preset-confirm-name" type="text" spellcheck="false">
    </div>
    <div class="modal-buttons preset-confirm-buttons">
      <button id="preset-confirm-save" type="button">save &amp; load</button>
      <div class="spacer"></div>
      <button id="preset-confirm-discard" type="button">discard</button>
      <button id="preset-confirm-cancel" type="button">cancel</button>
    </div>
  </dialog>
  <dialog id="effect-dialog" aria-modal="true">
    <p id="effect-dialog-name"></p>
    <p id="effect-dialog-desc"></p>
    <div id="effect-dialog-params"></div>
    <div class="modal-buttons">
      <button id="effect-dialog-apply" type="button">apply</button>
      <button id="effect-dialog-cancel" type="button">cancel</button>
    </div>
  </dialog>
  <dialog id="add-effect-dialog" aria-modal="true">
    <div class="add-effect-select-row">
      <label for="add-effect-select">effect</label>
      <select id="add-effect-select"></select>
    </div>
    <p id="add-effect-desc"></p>
    <div id="add-effect-params"></div>
    <div class="modal-buttons">
      <button id="add-effect-apply" type="button">add</button>
      <button id="add-effect-cancel" type="button">cancel</button>
    </div>
  </dialog>
  <dialog id="wrap-dialog" aria-modal="true">
    <div class="add-effect-select-row">
      <label for="wrap-select">wrap with</label>
      <select id="wrap-select"></select>
    </div>
    <p id="wrap-desc"></p>
    <div id="wrap-params"></div>
    <div class="modal-buttons">
      <button id="wrap-apply" type="button">wrap</button>
      <button id="wrap-cancel" type="button">cancel</button>
    </div>
  </dialog>
  <dialog id="help-dialog" aria-label="help">
    <div class="help-tabs" role="tablist">
      <button class="help-tab active" data-tab="app" role="tab">app</button>
      <button class="help-tab" data-tab="language" role="tab">language</button>
      <button class="help-tab" data-tab="effects" role="tab">effects</button>
    </div>
    <div id="help-content"></div>
    <div class="modal-buttons">
      <button id="help-close" type="button">close</button>
    </div>
  </dialog>
  <script>const HELP_MD = '__HELP_MD__'; const GLITCHSP_MD = '__GLITCHSP_MD__'; const EFFECTS_MD = '__EFFECTS_MD__';</script>
  <script src="https://unpkg.com/tone/build/Tone.js"></script>
  <script src="glitchbuf.js"></script>

</body>

</html>
