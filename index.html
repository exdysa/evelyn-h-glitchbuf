<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>glitchbuf</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="controls">
    <input type="file" id="file" accept="image/*">
    <div class="seed-row">
      <label for="seed">Seed</label>
      <input type="text" id="seed" spellcheck="false">
      <button id="new-seed">New</button>
    </div>
    <textarea id="code" spellcheck="false">select 0.2 0.3 (echo 0.25 -6)
bitcrush 4
noise -30</textarea>
    <div class="buttons">
      <button id="run">Run</button>
      <button id="download">Download PNG</button>
    </div>
    <pre id="error"></pre>
  </div>
  <div id="canvas-pane">
    <canvas id="canvas"></canvas>
  </div>
  <script src="https://unpkg.com/tone/build/Tone.js"></script>
  <script src="dist/glitchbuf.js"></script>
</body>
</html>
