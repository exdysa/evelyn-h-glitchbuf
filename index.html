<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>glitchbuf</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="controls">
    <div class="file-seed-row">
      <div class="field">
        <label for="file">input image</label>
        <input type="file" id="file" accept="image/*">
      </div>
      <div class="field seed-row">
        <label for="seed">seed</label>
        <input type="text" id="seed" spellcheck="false">
        <button id="new-seed">randomise</button>
      </div>
    </div>
    <div class="field presets-row">
      <label>presets</label>
      <select id="presets"><option value="">— select preset —</option></select>
      <button id="save-preset">save</button>
      <button id="delete-preset" disabled>delete</button>
    </div>
    <div id="canvas-pane">
      <div id="no-image">no image loaded</div>
      <div id="loading">rendering…</div>
      <div id="canvas-wrap">
        <span id="preview-label">preview</span>
        <canvas id="canvas"></canvas>
      </div>
    </div>
    <div class="field script-field">
      <label for="code">script</label>
      <textarea id="code" spellcheck="false">bitcrush 4
noise -24</textarea>
    </div>
    <div class="buttons">
      <button id="run">run</button>
      <button id="download">download png</button>
    </div>
    <pre id="error"></pre>
  </div>
  <dialog id="modal">
    <p id="modal-msg"></p>
    <input id="modal-input" type="text" spellcheck="false" hidden>
    <div class="modal-buttons">
      <button id="modal-ok">ok</button>
      <button id="modal-cancel">cancel</button>
    </div>
  </dialog>
  <script src="https://unpkg.com/tone/build/Tone.js"></script>
  <script src="dist/glitchbuf.js"></script>
</body>
</html>
